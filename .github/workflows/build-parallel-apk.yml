name: Build Mihon APK (Parallel Download)

on:
  workflow_dispatch:
    inputs:
      parallel_pages:
        description: 'Jumlah halaman paralel (3-10)'
        required: true
        default: '5'
      parallel_chapters:
        description: 'Jumlah chapter paralel (1-3)'
        required: true
        default: '2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Mihon
        uses: actions/checkout@v4
        with:
          repository: mihonapp/mihon
          ref: main
          fetch-depth: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Apply Parallel Download Patch
        env:
          PARALLEL_PAGES: ${{ github.event.inputs.parallel_pages }}
          PARALLEL_CHAPTERS: ${{ github.event.inputs.parallel_chapters }}
        run: |
          DOWNLOADER=$(find . -name "Downloader.kt" | head -1)
          echo "Patching: $DOWNLOADER"

          PATCH_DIR=$(dirname "$DOWNLOADER")

          python3 - <<PYEOF
          import os

          patch_dir = os.environ.get('PATCH_DIR', '$PATCH_DIR')
          pages = os.environ.get('PARALLEL_PAGES', '5')
          chapters = os.environ.get('PARALLEL_CHAPTERS', '2')

          kotlin_code = """package eu.kanade.tachiyomi.data.download

          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.async
          import kotlinx.coroutines.awaitAll
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.sync.Semaphore
          import kotlinx.coroutines.sync.withPermit
          import kotlinx.coroutines.withContext

          object ParallelDownloadConfig {
              const val PARALLEL_PAGES = """ + pages + """
              const val PARALLEL_CHAPTERS = """ + chapters + """
          }

          suspend fun <T> List<T>.parallelForEach(
              concurrency: Int = ParallelDownloadConfig.PARALLEL_PAGES,
              block: suspend (T) -> Unit
          ) {
              val semaphore = Semaphore(concurrency)
              withContext(Dispatchers.IO) {
                  map { item ->
                      async {
                          semaphore.withPermit { block(item) }
                      }
                  }.awaitAll()
              }
          }

          suspend fun <T> withRetry(
              maxRetry: Int = 3,
              block: suspend () -> T
          ): T {
              var lastError: Exception? = null
              repeat(maxRetry) { attempt ->
                  try {
                      return block()
                  } catch (e: Exception) {
                      lastError = e
                      if (attempt < maxRetry - 1) delay(1000L * (attempt + 1))
                  }
              }
              throw lastError ?: Exception("Failed after $maxRetry retries")
          }
          """

          out_path = os.path.join(patch_dir, 'ParallelDownloadExtensions.kt')
          with open(out_path, 'w') as f:
              f.write(kotlin_code)
          print(f"Written: {out_path}")
          PYEOF

          echo "Patch done! PARALLEL_PAGES=$PARALLEL_PAGES PARALLEL_CHAPTERS=$PARALLEL_CHAPTERS"

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mihon-parallel-download-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          
