name: Build Mihon APK (Parallel Download)

on:
  workflow_dispatch:
    inputs:
      parallel_pages:
        description: 'Jumlah halaman paralel (3-10)'
        required: true
        default: '5'
      parallel_chapters:
        description: 'Jumlah chapter paralel (1-3)'
        required: true
        default: '2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Mihon
        uses: actions/checkout@v4
        with:
          repository: mihonapp/mihon
          ref: main
          fetch-depth: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Apply Parallel Download Patch
        run: |
          PARALLEL_PAGES=${{ github.event.inputs.parallel_pages }}
          PARALLEL_CHAPTERS=${{ github.event.inputs.parallel_chapters }}

          DOWNLOADER=$(find . -name "Downloader.kt" | head -1)
          echo "Found: $DOWNLOADER"
          cp "$DOWNLOADER" "${DOWNLOADER}.bak"

          if ! grep -q "PARALLEL_PAGES" "$DOWNLOADER"; then
            sed -i "/companion object {/a\\        private const val PARALLEL_PAGES = $PARALLEL_PAGES\n        private const val PARALLEL_CHAPTERS = $PARALLEL_CHAPTERS" "$DOWNLOADER"
          fi

          PATCH_DIR=$(dirname "$DOWNLOADER")
          cat > "$PATCH_DIR/ParallelDownloadExtensions.kt" << 'KOTLIN'
package eu.kanade.tachiyomi.data.download

import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.async
import kotlinx.coroutines.awaitAll
import kotlinx.coroutines.delay
import kotlinx.coroutines.sync.Semaphore
import kotlinx.coroutines.sync.withPermit
import kotlinx.coroutines.withContext

suspend fun <T> List<T>.parallelForEach(
    concurrency: Int = 5,
    block: suspend (T) -> Unit
) {
    val semaphore = Semaphore(concurrency)
    withContext(Dispatchers.IO) {
        map { item ->
            async {
                semaphore.withPermit { block(item) }
            }
        }.awaitAll()
    }
}

suspend fun <T> withRetry(
    maxRetry: Int = 3,
    block: suspend () -> T
): T {
    var lastError: Exception? = null
    repeat(maxRetry) { attempt ->
        try {
            return block()
        } catch (e: Exception) {
            lastError = e
            if (attempt < maxRetry - 1) delay(1000L * (attempt + 1))
        }
    }
    throw lastError ?: Exception("Gagal setelah $maxRetry percobaan")
}
KOTLIN

          echo "Patch applied! PARALLEL_PAGES=$PARALLEL_PAGES PARALLEL_CHAPTERS=$PARALLEL_CHAPTERS"

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Rename APK
        run: |
          PAGES=${{ github.event.inputs.parallel_pages }}
          DATE=$(date +%Y%m%d)
          APK_SRC=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          APK_DST="mihon-parallel-p${PAGES}-${DATE}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mihon-parallel-download-apk
          path: ${{ env.APK_PATH }}
          retention-days: 7
