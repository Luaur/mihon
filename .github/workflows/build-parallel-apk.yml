name: Build Mihon APK (Parallel Download)

on:
  # Bisa trigger manual dari tab Actions di GitHub
  workflow_dispatch:
    inputs:
      parallel_pages:
        description: 'Jumlah halaman paralel (3-10)'
        required: true
        default: '5'
      parallel_chapters:
        description: 'Jumlah chapter paralel (1-3)'
        required: true
        default: '2'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Clone repo Mihon ───────────────────────────────────
      - name: Checkout Mihon
        uses: actions/checkout@v4
        with:
          repository: mihonapp/mihon
          ref: main
          fetch-depth: 1

      # ─── 2. Setup Java 17 ──────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 3. Cache Gradle ───────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─── 4. Apply Parallel Download Patch ─────────────────────
      - name: Apply Parallel Download Patch
        run: |
          PARALLEL_PAGES=${{ github.event.inputs.parallel_pages }}
          PARALLEL_CHAPTERS=${{ github.event.inputs.parallel_chapters }}

          # Temukan file Downloader.kt
          DOWNLOADER=$(find . -name "Downloader.kt" | head -1)
          echo "Found Downloader.kt at: $DOWNLOADER"

          # Backup file asli
          cp "$DOWNLOADER" "${DOWNLOADER}.bak"

          # Tambahkan import jika belum ada
          if ! grep -q "kotlinx.coroutines.sync.Semaphore" "$DOWNLOADER"; then
            sed -i '/^import kotlinx.coroutines/a import kotlinx.coroutines.async\nimport kotlinx.coroutines.awaitAll\nimport kotlinx.coroutines.sync.Semaphore\nimport kotlinx.coroutines.sync.withPermit' "$DOWNLOADER"
          fi

          # Inject konstanta PARALLEL_PAGES dan PARALLEL_CHAPTERS
          # ke dalam companion object (jika belum ada)
          if ! grep -q "PARALLEL_PAGES" "$DOWNLOADER"; then
            sed -i "/companion object {/a\\        private const val PARALLEL_PAGES = $PARALLEL_PAGES\n        private const val PARALLEL_CHAPTERS = $PARALLEL_CHAPTERS" "$DOWNLOADER"
          fi

          echo "✅ Patch applied successfully"
          echo "   PARALLEL_PAGES=$PARALLEL_PAGES"
          echo "   PARALLEL_CHAPTERS=$PARALLEL_CHAPTERS"

      # ─── 5. Inject Parallel Logic via Kotlin Script ───────────
      - name: Inject Parallel Download Function
        run: |
          DOWNLOADER=$(find . -name "Downloader.kt" | head -1)

          # Buat file patch kotlin tambahan sebagai extension
          PATCH_FILE="app/src/main/java/eu/kanade/tachiyomi/data/download/ParallelDownloadExtensions.kt"

          cat > "$PATCH_FILE" << 'EOF'
          package eu.kanade.tachiyomi.data.download

          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.async
          import kotlinx.coroutines.awaitAll
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.sync.Semaphore
          import kotlinx.coroutines.sync.withPermit
          import kotlinx.coroutines.withContext

          /**
           * Ekstensi untuk parallel download halaman manga.
           * Diinjeksikan via GitHub Actions patch.
           */

          /**
           * Download list of items secara paralel dengan batas concurrency.
           * @param concurrency Jumlah item yang diproses bersamaan
           * @param block Fungsi suspend yang dijalankan untuk setiap item
           */
          suspend fun <T> List<T>.parallelForEach(
              concurrency: Int = 5,
              block: suspend (T) -> Unit
          ) {
              val semaphore = Semaphore(concurrency)
              withContext(Dispatchers.IO) {
                  map { item ->
                      async {
                          semaphore.withPermit {
                              block(item)
                          }
                      }
                  }.awaitAll()
              }
          }

          /**
           * Download dengan retry otomatis (exponential backoff).
           * @param maxRetry Jumlah maksimal percobaan ulang
           * @param block Fungsi yang akan dicoba ulang
           */
          suspend fun <T> withRetry(
              maxRetry: Int = 3,
              block: suspend () -> T
          ): T {
              var lastError: Exception? = null
              repeat(maxRetry) { attempt ->
                  try {
                      return block()
                  } catch (e: Exception) {
                      lastError = e
                      if (attempt < maxRetry - 1) {
                          delay(1000L * (attempt + 1)) // 1s, 2s, 3s
                      }
                  }
              }
              throw lastError ?: Exception("Gagal setelah $maxRetry percobaan")
          }
          EOF

          echo "✅ Extension file created: $PATCH_FILE"

      # ─── 6. Grant execute permission ke Gradle ─────────────────
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # ─── 7. Build APK ──────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      # ─── 8. Rename APK ─────────────────────────────────────────
      - name: Rename APK
        run: |
          PAGES=${{ github.event.inputs.parallel_pages }}
          DATE=$(date +%Y%m%d)
          APK_SRC=$(find . -name "*.apk" -path "*/debug/*" | head -1)
          APK_DST="mihon-parallel-p${PAGES}-${DATE}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          echo "✅ APK renamed to: $APK_DST"

      # ─── 9. Upload APK sebagai Artifact ────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mihon-parallel-download-apk
          path: ${{ env.APK_PATH }}
          retention-days: 7  # APK tersedia 7 hari untuk didownload
